<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1066 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Posting workflow: 1 connect accounts, 2 draft, 3 review and approve, 4 schedule, 5 auto-publish, 6 track status. Step 5 publishes in parallel to Facebook, LinkedIn and Threads.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .step   { fill:#ffffff; stroke:#e2e8f0; stroke-width:1.5; filter:url(#sh); }
      .num    { fill:#4f46e5; }
      .numt   { fill:#ffffff; font-size:13px; font-weight:700; text-anchor:middle; }
      .title  { fill:#0f172a; font-size:13.5px; font-weight:700; text-anchor:middle; }
      .sub    { fill:#64748b; font-size:10.5px; text-anchor:middle; }
      .flow   { stroke:#94a3b8; stroke-width:2; fill:none; }
      .chiptxt{ fill:#ffffff; font-size:12px; font-weight:700; text-anchor:middle; }
      .cap    { fill:#94a3b8; font-size:10.5px; text-anchor:middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="1066" height="300" fill="#f8fafc"/>
  <text x="24" y="34" fill="#0f172a" font-size="18" font-weight="800">Posting workflow</text>
  <text x="24" y="55" fill="#64748b" font-size="12">Draft once · approve · schedule · publish everywhere</text>

  <!-- ── Step cards (single left-to-right row) ───────────────────────────── -->
  <!-- 1 Connect accounts -->
  <g>
    <rect class="step" x="24" y="80" width="158" height="92" rx="14"/>
    <circle class="num" cx="50" cy="104" r="13"/><text class="numt" x="50" y="109">1</text>
    <text class="title" x="103" y="132">Connect accounts</text>
    <text class="sub"   x="103" y="151">paste token / OAuth</text>
    <text class="sub"   x="103" y="165">· encrypted at rest</text>
  </g>
  <!-- 2 Draft -->
  <g>
    <rect class="step" x="196" y="80" width="158" height="92" rx="14"/>
    <circle class="num" cx="222" cy="104" r="13"/><text class="numt" x="222" y="109">2</text>
    <text class="title" x="275" y="132">Draft</text>
    <text class="sub"   x="275" y="151">AI or manual</text>
    <text class="sub"   x="275" y="165">tailored per platform</text>
  </g>
  <!-- 3 Review & approve -->
  <g>
    <rect class="step" x="368" y="80" width="158" height="92" rx="14"/>
    <circle class="num" cx="394" cy="104" r="13"/><text class="numt" x="394" y="109">3</text>
    <text class="title" x="447" y="132">Review &amp; approve</text>
    <text class="sub"   x="447" y="151">human sign-off</text>
    <text class="sub"   x="447" y="165">edit before it posts</text>
  </g>
  <!-- 4 Schedule -->
  <g>
    <rect class="step" x="540" y="80" width="158" height="92" rx="14"/>
    <circle class="num" cx="566" cy="104" r="13"/><text class="numt" x="566" y="109">4</text>
    <text class="title" x="619" y="132">Schedule</text>
    <text class="sub"   x="619" y="151">pick date &amp; time</text>
    <text class="sub"   x="619" y="165">your timezone</text>
  </g>
  <!-- 5 Auto-publish -->
  <g>
    <rect class="step" x="712" y="80" width="158" height="92" rx="14"/>
    <circle class="num" cx="738" cy="104" r="13"/><text class="numt" x="738" y="109">5</text>
    <text class="title" x="791" y="132">Auto-publish</text>
    <text class="sub"   x="791" y="151">60s worker · retries</text>
    <text class="sub"   x="791" y="165">· token refresh</text>
  </g>
  <!-- 6 Track status -->
  <g>
    <rect class="step" x="884" y="80" width="158" height="92" rx="14"/>
    <circle class="num" cx="910" cy="104" r="13"/><text class="numt" x="910" y="109">6</text>
    <text class="title" x="963" y="132">Track status</text>
    <text class="sub"   x="963" y="151">Queue · Calendar</text>
    <text class="sub"   x="963" y="165">published / failed</text>
  </g>

  <!-- ── Flow arrows between steps (all left-to-right) ────────────────────── -->
  <line class="flow" x1="182" y1="126" x2="196" y2="126" marker-end="url(#arrow)"/>
  <line class="flow" x1="354" y1="126" x2="368" y2="126" marker-end="url(#arrow)"/>
  <line class="flow" x1="526" y1="126" x2="540" y2="126" marker-end="url(#arrow)"/>
  <line class="flow" x1="698" y1="126" x2="712" y2="126" marker-end="url(#arrow)"/>
  <line class="flow" x1="870" y1="126" x2="884" y2="126" marker-end="url(#arrow)"/>

  <!-- ── Fan-out: step 5 publishes in parallel to three platforms ─────────── -->
  <!-- vertical stem down from step 5, then three branches to chip tops -->
  <path class="flow" d="M791,172 V196"/>
  <path class="flow" d="M791,196 H645 V224" marker-end="url(#arrow)"/>
  <path class="flow" d="M791,196 V224"      marker-end="url(#arrow)"/>
  <path class="flow" d="M791,196 H937 V224" marker-end="url(#arrow)"/>

  <!-- Platform chips (brand colors) -->
  <g>
    <rect x="579" y="224" width="132" height="30" rx="15" fill="#1877F2" filter="url(#sh)"/>
    <text class="chiptxt" x="645" y="244">Facebook</text>

    <rect x="725" y="224" width="132" height="30" rx="15" fill="#0A66C2" filter="url(#sh)"/>
    <text class="chiptxt" x="791" y="244">LinkedIn</text>

    <rect x="871" y="224" width="132" height="30" rx="15" fill="#000000" filter="url(#sh)"/>
    <text class="chiptxt" x="937" y="244">Threads</text>
  </g>

  <text class="cap" x="791" y="276">published in parallel to every connected account</text>
</svg>
